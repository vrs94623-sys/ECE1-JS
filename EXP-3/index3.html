<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation and Event Handling</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
        }
        #box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            margin: 20px auto;
            line-height: 200px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="heading">Welcome</h1>

    <p id="para">This is a sample paragraph.</p>

    <button id="changeText">Change Text</button>
    <button id="changeColor">Change Color</button>
    <button id="hide">Hide Paragraph</button>
    <button id="show">Show Paragraph</button>

    <div id="box">Hover Me</div>

    <br><br>

    <input type="text" id="inputBox" placeholder="Type something">
    <p id="display"></p>

    <!-- Link external JavaScript -->
    <script src="script.js"></script>

</body>
</html>
