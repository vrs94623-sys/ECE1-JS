<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="banner"></div>

        <img src="./uuuu.png" alt="Student Photo" class="profile-img">

        <div class="info">
            <h2>vansh raj singh</h2>
            <p>Branch - ECE</p>
            <p>ABES Engineering College, Ghaziabad</p>
        </div>

        <div class="skills">
            <span class="skill">HTML</span>
            <span class="skill">CSS</span>
            <span class="skill">C++</span>
        </div>

        <div class="buttons">
            <button class="follow">Follow</button>
            <button class="message">Message</button>
        </div>
    </div>

</body>
</html>
